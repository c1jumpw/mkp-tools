<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Development Library</title>
<style>
  :root{
    --bg:#171310;
    --bg-2:#1e1a15;
    --panel:#221d18;
    --line:#332b22;
    --text:#ece5d8;
    --text-dim:#9c9082;
    --brass:#c9a15e;
    --brass-dim:#4a3d28;
    --brass-soft:rgba(201,161,94,0.12);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; padding-bottom:90px;
  }
  a{color:inherit;}
  .wrap{max-width:640px; margin:0 auto; padding:28px 18px 40px;}

  header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px;}
  .eyebrow{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass); font-weight:600;}
  h1{font-family:var(--serif); font-size:26px; font-weight:500; margin:4px 0 0; letter-spacing:.01em;}
  .date{font-size:12px; color:var(--text-dim); margin-top:5px;}

  .organize-toggle{display:flex; align-items:center; gap:8px; flex-shrink:0; margin-top:2px;}
  .organize-toggle span{font-size:11px; color:var(--text-dim); font-weight:600;}
  .switch{position:relative; width:38px; height:21px;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; background:var(--panel); border:1px solid var(--line); border-radius:22px; cursor:pointer; transition:.15s;}
  .slider:before{content:""; position:absolute; width:15px; height:15px; left:2px; top:2px; background:var(--text-dim); border-radius:50%; transition:.15s;}
  .switch input:checked + .slider{background:var(--brass-dim); border-color:var(--brass);}
  .switch input:checked + .slider:before{transform:translateX(17px); background:var(--brass);}

  /* Today's Practice */
  .practice-card{
    background: linear-gradient(160deg, var(--panel), var(--bg-2));
    border:1px solid var(--line); border-radius:16px; padding:22px 20px;
    margin-bottom:24px; position:relative; overflow:hidden;
  }
  .practice-card:before{
    content:""; position:absolute; top:-40%; right:-20%; width:220px; height:220px;
    background:radial-gradient(circle, var(--brass-soft), transparent 70%);
    pointer-events:none;
  }
  .practice-label{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass); font-weight:600;}
  .practice-title{font-family:var(--serif); font-size:20px; margin:8px 0 4px; line-height:1.3;}
  .practice-sub{font-size:12px; color:var(--text-dim); margin-bottom:16px;}
  .practice-play{
    display:inline-flex; align-items:center; gap:9px; background:var(--brass); color:#221a0e;
    border:none; padding:10px 18px; border-radius:30px; font-weight:700; font-size:13.5px; cursor:pointer;
  }
  .practice-play svg{width:13px; height:13px;}

  /* view toggle */
  .view-toggle{display:flex; gap:4px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:16px;}
  .view-tab{flex:1; text-align:center; padding:8px 0; border-radius:7px; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text-dim); user-select:none;}
  .view-tab.active{background:var(--brass-dim); color:var(--brass);}

  /* search + filter */
  .controls{display:flex; gap:8px; margin-bottom:16px;}
  .search{
    flex:1; background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:10px 13px; color:var(--text); font-size:13.5px; outline:none;
  }
  .search:focus{border-color:var(--brass);}
  .filters{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .filter-chip{
    padding:7px 13px; border-radius:20px; border:1px solid var(--line); background:var(--panel);
    color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; user-select:none;
  }
  .filter-chip.active{background:var(--brass-dim); border-color:var(--brass); color:var(--brass);}

  /* collections bar */
  .collections-bar{display:none; gap:6px; flex-wrap:wrap; margin-bottom:16px;}
  .collections-bar.show{display:flex;}

  /* folder breadcrumb */
  .crumbs{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); margin-bottom:12px; flex-wrap:wrap;}
  .crumbs .seg{cursor:pointer;}
  .crumbs .seg:hover{color:var(--brass);}
  .crumbs .sep{opacity:.5;}
  .crumbs .seg.current{color:var(--text); cursor:default;}
  .pill-btn{
    margin-left:auto; padding:5px 11px; border-radius:20px; border:1px solid var(--brass-dim);
    color:var(--brass); font-weight:600; cursor:pointer; white-space:nowrap; font-size:12px;
  }

  /* list */
  .item{
    display:flex; align-items:center; gap:12px; padding:12px 12px; border-radius:12px;
    background:var(--panel); border:1px solid var(--line); margin-bottom:8px; cursor:pointer;
  }
  .item.folder{background:var(--bg-2);}
  .item-icon{
    width:38px; height:38px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg-2); color:var(--brass); font-size:16px;
  }
  .item.playing .item-icon{background:var(--brass-dim);}
  .item-body{flex:1; min-width:0;}
  .item-title{font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .item-meta{font-size:11px; color:var(--text-dim); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .item-chevron{color:var(--text-dim); font-size:13px; flex-shrink:0;}

  .organize-controls{display:flex; align-items:center; gap:6px; flex-shrink:0;}
  .icon-btn{
    width:30px; height:30px; border-radius:7px; border:1px solid var(--line); background:var(--bg-2);
    color:var(--text-dim); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer;
  }
  .icon-btn:hover{color:var(--brass); border-color:var(--brass-dim);}

  .empty{color:var(--text-dim); font-size:13px; text-align:center; padding:36px 0;}
  .loading{color:var(--text-dim); font-size:13px; text-align:center; padding:36px 0;}

  /* mini player */
  .mini-player{
    position:fixed; bottom:0; left:0; right:0; background:var(--panel); border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); display:none; align-items:center; gap:12px;
    z-index:40; backdrop-filter:blur(10px);
  }
  .mini-player.show{display:flex;}
  .mini-icon{width:34px; height:34px; border-radius:8px; background:var(--brass-dim); display:flex; align-items:center; justify-content:center; color:var(--brass); flex-shrink:0;}
  .mini-info{flex:1; min-width:0;}
  .mini-title{font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .mini-progress{height:3px; background:var(--line); border-radius:2px; margin-top:6px; cursor:pointer;}
  .mini-progress-fill{height:100%; background:var(--brass); border-radius:2px; width:0%;}
  .mini-btn{
    width:34px; height:34px; border-radius:50%; background:var(--brass); border:none; color:#221a0e;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .mini-close{background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; flex-shrink:0; padding:4px;}

  /* video / doc modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.92); z-index:60; display:none;
    align-items:center; justify-content:center; padding:0;
  }
  .modal-overlay.show{display:flex;}
  .modal-close{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text); font-size:26px; cursor:pointer; z-index:61;}
  .modal-content{width:100%; height:100%; display:flex; align-items:center; justify-content:center;}
  .modal-content video{max-width:100%; max-height:100%;}
  .modal-content iframe{width:100%; height:100%; border:none;}

  /* tag modal */
  .tag-modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.75); z-index:70; display:none;
    align-items:center; justify-content:center; padding:20px;
  }
  .tag-modal-overlay.show{display:flex;}
  .tag-modal{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px; width:100%; max-width:380px;}
  .tag-modal-title{font-family:var(--serif); font-size:18px;}
  .tag-modal-file{font-size:12px; color:var(--text-dim); margin-top:3px; margin-bottom:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tag-list{display:flex; flex-direction:column; gap:9px; max-height:200px; overflow-y:auto; margin-bottom:12px;}
  .tag-row{display:flex; align-items:center; gap:10px; font-size:13.5px;}
  .tag-row input{width:16px; height:16px; accent-color:var(--brass);}
  .tag-empty{font-size:12.5px; color:var(--text-dim);}
  .tag-new-row{display:flex; gap:7px; margin-bottom:16px;}
  .tag-new-row input{flex:1; background:var(--bg-2); border:1px solid var(--line); color:var(--text); padding:8px 10px; border-radius:8px; font-size:13px;}
  .tag-new-row button{padding:8px 12px; border-radius:8px; border:none; background:var(--bg-2); color:var(--brass); border:1px solid var(--brass-dim); font-weight:700; font-size:12px; cursor:pointer;}
  .tag-modal-actions{display:flex; gap:8px; justify-content:flex-end;}
  .tag-modal-actions button{padding:9px 16px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; border:none;}
  .tag-cancel{background:var(--bg-2); color:var(--text); border:1px solid var(--line) !important;}
  .tag-save{background:var(--brass); color:#221a0e;}

  .rename-row{display:flex; gap:6px; align-items:center; margin-top:8px;}
  .rename-row input{flex:1; background:var(--bg-2); border:1px solid var(--line); color:var(--text); padding:7px 9px; border-radius:7px; font-size:12.5px;}
  .rename-row button{padding:7px 10px; border-radius:7px; border:none; background:var(--brass); color:#221a0e; font-weight:700; font-size:11.5px; cursor:pointer;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Personal Development Library</div>
      <h1>Good morning.</h1>
      <div class="date" id="todayDate"></div>
    </div>
    <div class="organize-toggle">
      <span>Organize</span>
      <label class="switch">
        <input type="checkbox" id="organizeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div class="practice-card" id="practiceCard" style="display:none;">
    <div class="practice-label">Today's Practice</div>
    <div class="practice-title" id="practiceTitle">—</div>
    <div class="practice-sub" id="practiceSub">One thing to return to today.</div>
    <button class="practice-play" id="practicePlay">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Play
    </button>
  </div>

  <div class="view-toggle">
    <div class="view-tab active" data-view="browse">Browse</div>
    <div class="view-tab" data-view="collections">Collections</div>
  </div>

  <div class="controls">
    <input class="search" id="search" placeholder="Search your library…">
  </div>
  <div class="filters">
    <div class="filter-chip active" data-filter="all">All</div>
    <div class="filter-chip" data-filter="audio">Audio</div>
    <div class="filter-chip" data-filter="video">Video</div>
    <div class="filter-chip" data-filter="docs">Docs</div>
  </div>

  <div class="collections-bar" id="collectionsBar"></div>
  <div class="crumbs" id="crumbs"></div>

  <div id="listing"><div class="loading">Loading your library…</div></div>
</div>

<div class="mini-player" id="miniPlayer">
  <div class="mini-icon">♪</div>
  <div class="mini-info">
    <div class="mini-title" id="miniTitle">—</div>
    <div class="mini-progress" id="miniProgress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
  </div>
  <button class="mini-btn" id="miniPlayPause">
    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>
  <button class="mini-close" id="miniClose">✕</button>
</div>
<audio id="audioEl"></audio>

<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="tag-modal-overlay" id="tagModalOverlay">
  <div class="tag-modal">
    <div class="tag-modal-title">Add to collections</div>
    <div class="tag-modal-file" id="tagModalFile"></div>
    <div class="tag-list" id="tagList"></div>
    <div class="tag-new-row">
      <input type="text" id="newCollectionInput" placeholder="New collection name…">
      <button id="newCollectionBtn">Add</button>
    </div>
    <div class="tag-modal-actions">
      <button class="tag-cancel" id="tagModalCancel">Cancel</button>
      <button class="tag-save" id="tagModalSave">Save</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---- CONFIGURE YOUR REPO HERE ----
  const OWNER = "c1jumpw";
  const REPO = "mkp-tools";
  const BRANCH = "main";
  const ROOT_PATH = "pdl";
  const MEDIA_PATH = "pdl/media";
  const COLLECTIONS_PATH = "pdl/media/.collections.json";

  // Same relay used by the uploader — paste the Worker URL and app key from your setup here.
  const CONFIG = {
    WORKER_URL: "https://pdl-relay.c1-jumpw.workers.dev",
    APP_KEY: "87rh49bfughdbvfa34rdasdfrge1SS4"
  };
  // -----------------------------------

  const el = id => document.getElementById(id);

  function relayFetch(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ "X-App-Key": CONFIG.APP_KEY }, opts.headers || {});
    return fetch(CONFIG.WORKER_URL.replace(/\/+$/, "") + path, opts);
  }

  el("todayDate").textContent = new Date().toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" });

  const AUDIO_EXT = ["mp3","m4a","wav","aac","flac","ogg"];
  const VIDEO_EXT = ["mp4","mov","m4v","webm"];
  const DOC_EXT = ["pdf","doc","docx","txt","md"];

  function kindOf(name){
    const ext = name.split(".").pop().toLowerCase();
    if (AUDIO_EXT.includes(ext)) return "audio";
    if (VIDEO_EXT.includes(ext)) return "video";
    if (DOC_EXT.includes(ext)) return "docs";
    return "other";
  }
  function niceName(name){
    return name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
  }
  function slugify(name){
    return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || ("c" + Date.now());
  }

  let currentPath = MEDIA_PATH;
  let allEntries = [];
  let activeFilter = "all";
  let searchTerm = "";
  let currentView = "browse";
  let selectedCollectionId = null;
  let collectionsData = { collections: [], assignments: {} };
  let currentTagEntry = null;

  async function fetchFolder(path){
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path.split("/").map(encodeURIComponent).join("/")}?ref=${BRANCH}`, {
      headers: { "Accept": "application/vnd.github+json" }
    });
    if (!res.ok) throw new Error(`Could not load ${path} (${res.status})`);
    return res.json();
  }

  function rawUrl(path){
    return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path.split("/").map(encodeURIComponent).join("/")}`;
  }
  function blobUrl(path){
    return `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${path.split("/").map(encodeURIComponent).join("/")}`;
  }

  // ---------- collections (tags) ----------
  function b64ToUtf8(b64){
    return decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));
  }
  function utf8ToB64(str){
    return btoa(unescape(encodeURIComponent(str)));
  }

  async function loadCollectionsData(){
    try{
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${COLLECTIONS_PATH.split("/").map(encodeURIComponent).join("/")}?ref=${BRANCH}`, {
        headers: { "Accept": "application/vnd.github+json" }
      });
      if (res.status === 404){ collectionsData = { collections: [], assignments: {} }; return; }
      if (!res.ok) throw new Error("load failed");
      const json = await res.json();
      collectionsData = JSON.parse(b64ToUtf8(json.content));
      if (!collectionsData.collections) collectionsData.collections = [];
      if (!collectionsData.assignments) collectionsData.assignments = {};
    } catch(e){
      collectionsData = { collections: [], assignments: {} };
    }
  }

  async function saveCollectionsData(){
    // Fetch the current sha right before writing to minimize the chance of a stale-sha conflict.
    let sha = null;
    try{
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${COLLECTIONS_PATH.split("/").map(encodeURIComponent).join("/")}?ref=${BRANCH}`, {
        headers: { "Accept": "application/vnd.github+json" }
      });
      if (res.ok) sha = (await res.json()).sha;
    } catch(e){ /* file may not exist yet — that's fine, sha stays null */ }

    const body = { message: "Update collections", content: utf8ToB64(JSON.stringify(collectionsData, null, 2)) };
    if (sha) body.sha = sha;

    try{
      const res = await relayFetch(`/contents/${COLLECTIONS_PATH.split("/").map(encodeURIComponent).join("/")}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok){
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      return true;
    } catch(err){
      alert("Couldn't save collections: " + err.message);
      return false;
    }
  }

  function collectionName(id){
    const c = collectionsData.collections.find(c => c.id === id);
    return c ? c.name : id;
  }

  function openTagModal(entry){
    currentTagEntry = entry;
    el("tagModalFile").textContent = niceName(entry.name);
    renderTagList();
    el("tagModalOverlay").classList.add("show");
  }
  function closeTagModal(){
    el("tagModalOverlay").classList.remove("show");
    currentTagEntry = null;
  }
  function renderTagList(){
    const box = el("tagList");
    box.innerHTML = "";
    if (!collectionsData.collections.length){
      box.innerHTML = '<div class="tag-empty">No collections yet — add one below.</div>';
      return;
    }
    const current = collectionsData.assignments[currentTagEntry.path] || [];
    collectionsData.collections.forEach(c => {
      const row = document.createElement("label");
      row.className = "tag-row";
      row.innerHTML = `<input type="checkbox" value="${c.id}" ${current.includes(c.id) ? "checked" : ""}> <span>${c.name}</span>`;
      box.appendChild(row);
    });
  }
  el("newCollectionBtn").addEventListener("click", () => {
    const name = el("newCollectionInput").value.trim();
    if (!name) return;
    const id = slugify(name);
    if (!collectionsData.collections.find(c => c.id === id)){
      collectionsData.collections.push({ id, name });
    }
    el("newCollectionInput").value = "";
    renderTagList();
    const cb = el("tagList").querySelector(`input[value="${id}"]`);
    if (cb) cb.checked = true;
  });
  el("tagModalCancel").addEventListener("click", closeTagModal);
  el("tagModalSave").addEventListener("click", async () => {
    const checked = Array.from(el("tagList").querySelectorAll("input[type=checkbox]:checked")).map(cb => cb.value);
    if (checked.length) collectionsData.assignments[currentTagEntry.path] = checked;
    else delete collectionsData.assignments[currentTagEntry.path];
    const ok = await saveCollectionsData();
    if (ok){
      closeTagModal();
      if (currentView === "collections") renderCollectionsView(); else renderListing();
    }
  });

  // ---------- Today's Practice ----------
  async function collectAllAudio(path, acc){
    let entries;
    try { entries = await fetchFolder(path); } catch(e){ return acc; }
    for (const entry of entries){
      if (entry.type === "dir") await collectAllAudio(entry.path, acc);
      else if (kindOf(entry.name) === "audio") acc.push(entry);
    }
    return acc;
  }

  async function loadTodaysPractice(){
    try{
      const all = await collectAllAudio(MEDIA_PATH, []);
      if (!all.length) return;
      const dayIndex = Math.floor(Date.now() / 86400000);
      const pick = all[dayIndex % all.length];
      el("practiceTitle").textContent = niceName(pick.name);
      el("practiceSub").textContent = "Repeated today, from your library.";
      el("practiceCard").style.display = "block";
      el("practicePlay").addEventListener("click", () => playAudio(pick));
    } catch(e){ /* quietly skip if unavailable */ }
  }

  // ---------- Browse view ----------
  function buildCrumbs(){
    const box = el("crumbs");
    box.innerHTML = "";
    const rel = currentPath.slice(MEDIA_PATH.length).split("/").filter(Boolean);
    const segs = [{ label: "Library", path: MEDIA_PATH }];
    let acc = MEDIA_PATH;
    rel.forEach(seg => { acc += "/" + seg; segs.push({ label: seg, path: acc }); });
    segs.forEach((s, i) => {
      const span = document.createElement("span");
      span.className = "seg" + (i === segs.length - 1 ? " current" : "");
      span.textContent = s.label;
      if (i !== segs.length - 1) span.addEventListener("click", () => { currentPath = s.path; loadCurrentFolder(); });
      box.appendChild(span);
      if (i !== segs.length - 1){
        const sep = document.createElement("span");
        sep.className = "sep"; sep.textContent = "›";
        box.appendChild(sep);
      }
    });
    if (el("organizeToggle").checked){
      const btn = document.createElement("span");
      btn.className = "pill-btn";
      btn.textContent = "+ New folder";
      btn.addEventListener("click", createFolder);
      box.appendChild(btn);
    }
  }

  function iconFor(kind){
    if (kind === "audio") return "♪";
    if (kind === "video") return "▶";
    if (kind === "docs") return "▤";
    return "•";
  }

  function renderListing(){
    const box = el("listing");
    box.innerHTML = "";
    const organizing = el("organizeToggle").checked;

    let visible = allEntries.filter(e => {
      if (e.type === "dir") return true;
      const kind = kindOf(e.name);
      if (activeFilter !== "all" && kind !== activeFilter) return false;
      if (searchTerm && !e.name.toLowerCase().includes(searchTerm)) return false;
      return true;
    });

    if (!visible.length){
      box.innerHTML = '<div class="empty">Nothing here yet.</div>';
      return;
    }

    const folders = visible.filter(e => e.type === "dir");
    const files = visible.filter(e => e.type !== "dir");

    folders.forEach(f => box.appendChild(renderFolderRow(f, organizing)));
    files.forEach(f => box.appendChild(renderFileRow(f, organizing)));
  }

  function renderFolderRow(entry, organizing){
    const row = document.createElement("div");
    row.className = "item folder";
    row.innerHTML = `
      <div class="item-icon">📁</div>
      <div class="item-body">
        <div class="item-title">${entry.name}</div>
        <div class="item-meta">Folder</div>
      </div>
      <div class="item-chevron">›</div>`;
    row.addEventListener("click", (e) => {
      if (e.target.closest(".rename-row") || e.target.closest("input") || e.target.closest("button")) return;
      currentPath = entry.path;
      loadCurrentFolder();
    });
    return row;
  }

  function renderFileRow(entry, organizing){
    const kind = kindOf(entry.name);
    const row = document.createElement("div");
    row.className = "item";
    row.dataset.path = entry.path;

    const tags = collectionsData.assignments[entry.path];
    const tagStr = tags && tags.length ? " · " + tags.map(collectionName).join(", ") : "";

    row.innerHTML = `
      <div class="item-icon">${iconFor(kind)}</div>
      <div class="item-body">
        <div class="item-title">${niceName(entry.name)}</div>
        <div class="item-meta">${kind.toUpperCase()}${entry.size ? " · " + (entry.size/(1024*1024)).toFixed(1) + " MB" : ""}${tagStr}</div>
      </div>
      ${organizing ? '<div class="organize-controls"><div class="icon-btn" data-act="tag" title="Collections">🏷</div><div class="icon-btn" data-act="rename" title="Rename">✎</div><div class="icon-btn" data-act="move" title="Move">⇄</div></div>' : ""}
    `;

    row.addEventListener("click", (e) => {
      if (e.target.closest(".organize-controls")) return;
      if (kind === "audio") playAudio(entry);
      else if (kind === "video") playVideo(entry);
      else openDoc(entry);
    });

    if (organizing){
      row.querySelector('[data-act="tag"]').addEventListener("click", (e) => {
        e.stopPropagation();
        openTagModal(entry);
      });
      row.querySelector('[data-act="rename"]').addEventListener("click", (e) => {
        e.stopPropagation();
        startRename(row, entry);
      });
      row.querySelector('[data-act="move"]').addEventListener("click", (e) => {
        e.stopPropagation();
        startMove(entry);
      });
    }
    return row;
  }

  function startRename(row, entry){
    if (row.querySelector(".rename-row")) return;
    const wrap = document.createElement("div");
    wrap.className = "rename-row";
    wrap.innerHTML = `<input type="text" value="${entry.name}"><button>Save</button>`;
    row.appendChild(wrap);
    const input = wrap.querySelector("input");
    input.focus();
    wrap.querySelector("button").addEventListener("click", async (e) => {
      e.stopPropagation();
      const newName = input.value.trim();
      if (!newName || newName === entry.name) { wrap.remove(); return; }
      const newPath = entry.path.replace(/[^/]+$/, newName);
      await moveFile(entry, newPath);
    });
  }

  function startMove(entry){
    const dest = prompt(`Move "${entry.name}" to which folder? (relative to library, e.g. "wealth" or leave blank for the library root)`, "");
    if (dest === null) return;
    const cleanDest = dest.trim().replace(/^\/+|\/+$/g, "");
    const newPath = (cleanDest ? `${MEDIA_PATH}/${cleanDest}` : MEDIA_PATH) + "/" + entry.name;
    moveFile(entry, newPath);
  }

  // ---------- relay-backed writes ----------
  async function moveFile(entry, newPath){
    try{
      const refRes = await relayFetch("/ref", { method: "GET" });
      if (!refRes.ok) throw new Error((await refRes.json().catch(()=>({}))).message || "ref read failed");
      const refData = await refRes.json();
      const parentSha = refData.object.sha;

      const commitRes = await relayFetch(`/commit/${parentSha}`, { method: "GET" });
      const commitData = await commitRes.json();
      const baseTree = commitData.tree.sha;

      const treeRes = await relayFetch("/tree", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          base_tree: baseTree,
          tree: [
            { path: entry.path, mode: "100644", type: "blob", sha: null },
            { path: newPath, mode: "100644", type: "blob", sha: entry.sha }
          ]
        })
      });
      if (!treeRes.ok) throw new Error((await treeRes.json().catch(()=>({}))).message || "tree error");
      const newTreeSha = (await treeRes.json()).sha;

      const commitNewRes = await relayFetch("/commit", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: `Move ${entry.name}`, tree: newTreeSha, parents: [parentSha] })
      });
      if (!commitNewRes.ok) throw new Error((await commitNewRes.json().catch(()=>({}))).message || "commit error");
      const newCommitSha = (await commitNewRes.json()).sha;

      const updateRes = await relayFetch("/ref", {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sha: newCommitSha })
      });
      if (!updateRes.ok) throw new Error((await updateRes.json().catch(()=>({}))).message || "ref update error");

      loadCurrentFolder();
    } catch(err){
      alert("Move failed: " + err.message + "\n\nGitHub can have a brief replication delay — try again in a few seconds.");
    }
  }

  async function createFolder(){
    const name = prompt("Name for the new folder:", "");
    if (!name) return;
    const clean = name.trim().replace(/[\/\\]+/g, "-");
    if (!clean) return;
    const path = `${currentPath}/${clean}/.gitkeep`;
    try{
      const res = await relayFetch(`/contents/${path.split("/").map(encodeURIComponent).join("/")}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: `Create folder ${clean}`, content: btoa("This file keeps the folder in git history.") })
      });
      if (!res.ok){
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.message || `HTTP ${res.status}`);
      }
      loadCurrentFolder();
    } catch(err){
      alert("Couldn't create the folder: " + err.message);
    }
  }

  async function loadCurrentFolder(){
    el("listing").innerHTML = '<div class="loading">Loading…</div>';
    buildCrumbs();
    try{
      allEntries = await fetchFolder(currentPath);
      allEntries.sort((a,b) => {
        if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
        return a.name.localeCompare(b.name);
      });
      renderListing();
    } catch(e){
      el("listing").innerHTML = `<div class="empty">Couldn't load this folder. ${e.message}</div>`;
    }
  }

  // ---------- Collections view ----------
  function renderCollectionsView(){
    const bar = el("collectionsBar");
    bar.innerHTML = "";
    collectionsData.collections.forEach(c => {
      const count = Object.values(collectionsData.assignments).filter(ids => ids.includes(c.id)).length;
      const chip = document.createElement("div");
      chip.className = "filter-chip" + (selectedCollectionId === c.id ? " active" : "");
      chip.textContent = `${c.name} (${count})`;
      chip.addEventListener("click", () => { selectedCollectionId = c.id; renderCollectionsView(); });
      bar.appendChild(chip);
    });
    if (el("organizeToggle").checked){
      const addChip = document.createElement("div");
      addChip.className = "pill-btn";
      addChip.style.marginLeft = collectionsData.collections.length ? "4px" : "0";
      addChip.textContent = "+ New collection";
      addChip.addEventListener("click", async () => {
        const name = prompt("Name for the new collection:", "");
        if (!name) return;
        const id = slugify(name);
        if (!collectionsData.collections.find(c => c.id === id)) collectionsData.collections.push({ id, name });
        const ok = await saveCollectionsData();
        if (ok) renderCollectionsView();
      });
      bar.appendChild(addChip);
    }

    const box = el("listing");
    box.innerHTML = "";
    if (!selectedCollectionId){
      box.innerHTML = collectionsData.collections.length
        ? '<div class="empty">Choose a collection above.</div>'
        : '<div class="empty">No collections yet. Turn on Organize, tap the tag icon on any file, or use "+ New collection".</div>';
      return;
    }
    let paths = Object.keys(collectionsData.assignments).filter(p => collectionsData.assignments[p].includes(selectedCollectionId));
    paths = paths.filter(p => {
      const name = p.split("/").pop();
      const kind = kindOf(name);
      if (activeFilter !== "all" && kind !== activeFilter) return false;
      if (searchTerm && !name.toLowerCase().includes(searchTerm)) return false;
      return true;
    });
    if (!paths.length){
      box.innerHTML = '<div class="empty">Nothing tagged here yet.</div>';
      return;
    }
    const organizing = el("organizeToggle").checked;
    paths.sort().forEach(p => {
      box.appendChild(renderFileRow({ name: p.split("/").pop(), path: p }, organizing));
    });
  }

  // ---------- view toggle ----------
  document.querySelectorAll(".view-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentView = tab.dataset.view;
      el("crumbs").style.display = currentView === "browse" ? "flex" : "none";
      el("collectionsBar").classList.toggle("show", currentView === "collections");
      if (currentView === "collections") renderCollectionsView(); else loadCurrentFolder();
    });
  });

  // ---------- filters / search ----------
  document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeFilter = chip.dataset.filter;
      if (currentView === "collections") renderCollectionsView(); else renderListing();
    });
  });
  el("search").addEventListener("input", e => {
    searchTerm = e.target.value.toLowerCase();
    if (currentView === "collections") renderCollectionsView(); else renderListing();
  });

  // ---------- organize toggle ----------
  el("organizeToggle").addEventListener("change", () => {
    if (currentView === "collections") renderCollectionsView();
    else { buildCrumbs(); renderListing(); }
  });

  // ---------- audio (mini player) ----------
  const audioEl = el("audioEl");

  function playAudio(entry){
    audioEl.src = rawUrl(entry.path);
    audioEl.play();
    el("miniTitle").textContent = niceName(entry.name);
    el("miniPlayer").classList.add("show");
    updatePlayPauseIcon(true);
    highlightPlaying(entry.path);
  }
  function highlightPlaying(path){
    document.querySelectorAll(".item").forEach(r => r.classList.toggle("playing", r.dataset.path === path));
  }
  function updatePlayPauseIcon(playing){
    el("miniPlayPause").innerHTML = playing
      ? '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>';
  }
  el("miniPlayPause").addEventListener("click", () => {
    if (audioEl.paused){ audioEl.play(); } else { audioEl.pause(); }
  });
  el("miniClose").addEventListener("click", () => {
    audioEl.pause(); audioEl.src = "";
    el("miniPlayer").classList.remove("show");
    highlightPlaying(null);
  });
  audioEl.addEventListener("timeupdate", () => {
    if (!audioEl.duration) return;
    el("miniProgressFill").style.width = (audioEl.currentTime / audioEl.duration * 100) + "%";
  });
  // Mobile browsers can pause/resume audio from the lock screen, OS media controls, or when
  // the tab is backgrounded — always mirror the element's real state, not just button taps.
  audioEl.addEventListener("play", () => updatePlayPauseIcon(true));
  audioEl.addEventListener("pause", () => updatePlayPauseIcon(false));
  audioEl.addEventListener("ended", () => updatePlayPauseIcon(false));
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") updatePlayPauseIcon(!audioEl.paused);
  });
  el("miniProgress").addEventListener("click", (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (audioEl.duration) audioEl.currentTime = pct * audioEl.duration;
  });

  // ---------- video / docs (modal) ----------
  function playVideo(entry){
    el("modalContent").innerHTML = `<video src="${rawUrl(entry.path)}" controls autoplay playsinline></video>`;
    el("modalOverlay").classList.add("show");
  }
  function openDoc(entry){
    const ext = entry.name.split(".").pop().toLowerCase();
    if (ext === "pdf"){
      el("modalContent").innerHTML = `<iframe src="${blobUrl(entry.path)}"></iframe>`;
      el("modalOverlay").classList.add("show");
    } else {
      window.open(blobUrl(entry.path), "_blank");
    }
  }
  el("modalClose").addEventListener("click", () => {
    el("modalContent").innerHTML = "";
    el("modalOverlay").classList.remove("show");
  });

  // ---------- init ----------
  loadTodaysPractice();
  loadCurrentFolder();
  loadCollectionsData().then(() => { if (currentView === "browse") renderListing(); });

})();
</script>
